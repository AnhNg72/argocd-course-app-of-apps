apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-app2
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: helm-app2
    server: https://kubernetes.default.svc
  project: default
  source:
    path: helm-hooks
    repoURL: https://github.com/AnhNg72/argocd-example-apps.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      allowEmpty: true
      selfHeal: true
    syncOptions:
    - allowEmpty=true
    - CreateNamespace=true

