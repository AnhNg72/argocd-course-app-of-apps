apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-app1
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: helm-app1
    server: {{ .values.spec.destination.server }}
  project: default
  source:
    path: helm-guestbook
    repoURL: {{ .values.spec.source.repoURL }}
    targetRevision: {{ .values.spec.source.targetRevision }}
  syncPolicy:
    automated:
      allowEmpty: true
      selfHeal: true
    syncOptions:
    - allowEmpty=true
    - CreateNamespace=true
